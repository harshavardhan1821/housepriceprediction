name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install streamlit pandas scikit-learn

      - name: Validate Python files
        run: python -m py_compile house.py

      - name: Smoke test imports
        run: python -c "import streamlit, pandas, sklearn; print('dependencies ok')"
